# Default values for deduplication-engine.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

backend:
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8000

celery:
  replicaCount: 1

global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

image:
  repository: unicef/hope-dedupe-engine
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  host: chart-example.local

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# PVC for model data (backend + celery worker + beat + model-downloader job).
# mountPath controls where the volume is mounted; set to /model for new deployments.
modelPvc:
  mountPath: /dde-model
  size: 4Gi
  storageClassName: azurefile

# Optional PVC for persistent data mounted at /var/data (backend + celery worker + beat).
dataPvc:
  enabled: false
  size: 10Gi
  storageClassName: azurefile

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

redis:
  enabled: true
  image:
    registry: docker.io
    repository: redis
    tag: "8"
  auth:
    enabled: false

  # Use custom config (no loadmodule) for official redis:8 — same as pipelines/redis/cd/stg.
  # Set master.extraVolumes in deploy values with configMap name "<release-name>-redis-config".
  master:
    command: ["redis-server"]
    args: ["/config/redis.conf"]
    extraVolumeMounts:
      - name: redis-conf
        mountPath: /config
        readOnly: true
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      allowPrivilegeEscalation: false
    podSecurityContext:
      fsGroup: 999

flower:
  enabled: false
  celeryBrokerUrl: ""

  service:
    type: ClusterIP
    port: 5555

keyvault:
  enabled: true
  envMappings: []
  mountPath: /mnt/secrets
  secretName: "keyvault-secret"

rollme:
  enabled: false

resetDatabase:
  enabled: false
  database: ""
