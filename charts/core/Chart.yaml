apiVersion: v2
name: core
description: A Helm chart for Kubernetes
type: application
version: 0.14.3
appVersion: "core-2.10.1"

dependencies:
  - name: postgresql
    version: "14.x.x"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: redis
    version: 24.1.8
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
  - name: redis
    version: 24.1.8
    repository: oci://registry-1.docker.io/bitnamicharts
    alias: redis-celery
    condition: redis-celery.enabled
  - name: prometheus-redis-exporter
    version: 6.9.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus-redis-exporter.enabled
  - name: elasticsearch
    version: 22.1.6
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: elasticsearch.enabled
  - name: elasticsearch
    version: 22.1.6
    repository: oci://registry-1.docker.io/bitnamicharts
    alias: es-hope-search
    condition: es-hope-search.enabled
  - name: elasticsearch
    version: 22.1.6
    repository: oci://registry-1.docker.io/bitnamicharts
    alias: es-hope-index
    condition: es-hope-index.enabled
  - name: keyvault
    version: 0.1.3
    repository: file://../keyvault
    condition: keyvault.enabled
