# Default values for hope-core.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: core
  annotations: {}

global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  security:
    allowInsecureImages: true

nginx:
  enabled: true

  image:
    repository: tivix/docker-nginx
    # Overrides the image tag whose default is the chart appVersion.
    tag: v18

  service:
    type: ClusterIP
    port: 80

celery:
  podAnnotations: {}

  autoscaling:
    enabled: true

  defaultWorker:
    replicaCount: 1

  periodicWorker:
    replicaCount: 1

flower:
  enabled: false

  image: saxix/flower:1.6
  replicaCount: 1
  podAnnotations: {}
  podSecurityContext: {}

  securityContext: {}

  tolerations: []
  affinity: {}
  service:
    type: ClusterIP
    port: 5555

  config:
    FLOWER_URL_PREFIX: flower

  secret:
    FLOWER_BASIC_AUTH: "change:me"

ingress:
  enabled: false
  # className: ""
  annotations: {}
  # kubernetes.io/tls-acme: "true"
  hosts:
  - host: chart-example.local
    paths:
    - path: /
      pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

backend:
  # Set to true when Constance uses DatabaseBackend instead of Redis.
  # Omits CONSTANCE_REDIS_CONNECTION from the backend secret and deployment env.
  constanceUseDatabase: false

  admin:
    create: true
    username: admin
    password: change-me-pretty-please
    email: admin@hope.local

  job:
    preUpgrade:
      command: python3 manage.py upgrade

  # it's recommended to not store secrets in the helm values file
  # but rather in a secret store like Azure Key Vault
  # so the below can be commented-out and keyvault.enabled set to true
  secret:
    SECRET_KEY: change-me

  config:
    CSP_REPORT_ONLY: "true"
    CSP_REPORT_PERCENTAGE: "0.1"
    CSP_DEFAULT_SRC: "'self'"
    CSP_FRAME_ANCESTORS: "'none'"
    CSP_STYLE_SRC: "'self','unsafe-inline','unsafe-eval',fonts.googleapis.com,cdn.jsdelivr.net,cdnjs.cloudflare.com,maxcdn.bootstrapcdn.com,unpkg.com"
    CSP_MANIFEST_SRC: "'self'"
    CSP_SCRIPT_SRC: "'self','unsafe-inline','unsafe-eval',js-agent.newrelic.com,cdn.jsdelivr.net,cdnjs.cloudflare.com,unpkg.com"
    CSP_IMG_SRC: "'self',data:,cdn.datatables.net,map1a.vis.earthdata.nasa.gov,map1b.vis.earthdata.nasa.gov,map1c.vis.earthdata.nasa.gov"
    CSP_FONT_SRC: "'self',data:,fonts.gstatic.com,maxcdn.bootstrapcdn.com"
    CSP_MEDIA_SRC: "'self'"
    CSP_CONNECT_SRC: "sentry.io,gov-bam.nr-data.net,cdn.jsdelivr.net"
    PROFILING: "'off'"

  replicaCount: 2

  image:
    repository: unicef/hope

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
  # fsGroup: 2000

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  service:
    type: ClusterIP
    port: 8000

  securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

  resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  livenessProbe:
    timeoutSeconds: 30
    httpGet:
      path: /api/_health
      port: 8000
      httpHeaders:
      - name: X-Health
        value: "Kubernetes-Health"
      - name: Host
        value: "kubernetes.internal"

  readinessProbe:
    timeoutSeconds: 30
    httpGet:
      path: /api/_health
      port: 8000
      httpHeaders:
      - name: X-Health
        value: "Kubernetes-Health"
      - name: Host
        value: "kubernetes.internal"

  nodeSelector: {}

  tolerations: []

  affinity: {}


postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 16.6.0-debian-12-r2
  auth:
    username: hopeuser
    password: change-me-please
    enablePostgresUser: true
    postgresPassword: really-change-me
  primary:
    initdb:
      user: postgres
      password: really-change-me
      scripts:
        init.sql: |
          CREATE DATABASE hopedb;
          GRANT ALL PRIVILEGES ON DATABASE hopedb TO hopeuser;
          \c hopedb;
          CREATE EXTENSION IF NOT EXISTS postgis;
          GRANT ALL ON SCHEMA public TO hopeuser;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO hopeuser;

          CREATE DATABASE cash_assist_datahub_mis;
          GRANT ALL PRIVILEGES ON DATABASE cash_assist_datahub_mis TO hopeuser;
          \c cash_assist_datahub_mis;
          CREATE EXTENSION IF NOT EXISTS postgis;
          GRANT ALL ON SCHEMA public TO hopeuser;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO hopeuser;

          CREATE DATABASE cash_assist_datahub_ca;
          GRANT ALL PRIVILEGES ON DATABASE cash_assist_datahub_ca TO hopeuser;
          \c cash_assist_datahub_ca;
          CREATE EXTENSION IF NOT EXISTS postgis;
          GRANT ALL ON SCHEMA public TO hopeuser;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO hopeuser;

          CREATE DATABASE cash_assist_datahub_erp;
          GRANT ALL PRIVILEGES ON DATABASE cash_assist_datahub_erp TO hopeuser;
          \c cash_assist_datahub_erp;
          CREATE EXTENSION IF NOT EXISTS postgis;
          GRANT ALL ON SCHEMA public TO hopeuser;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO hopeuser;

          CREATE DATABASE registration_datahub;
          GRANT ALL PRIVILEGES ON DATABASE registration_datahub TO hopeuser;
          \c registration_datahub;
          CREATE EXTENSION IF NOT EXISTS postgis;
          GRANT ALL ON SCHEMA public TO hopeuser;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO hopeuser;

redis:
  enabled: true
  image:
    registry: docker.io
    repository: redis
    tag: "8"
  architecture: standalone

  auth:
    enabled: false

  # Use custom config (no loadmodule) for official redis:8 image — same as pipelines/redis/cd/stg.
  # Set master.extraVolumes in deploy values with configMap name "<release-name>-redis-config".
  master:
    command: ["redis-server"]
    args: ["/config/redis.conf"]
    extraVolumeMounts:
      - name: redis-conf
        mountPath: /config
        readOnly: true
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      allowPrivilegeEscalation: false
    podSecurityContext:
      fsGroup: 999

redis-celery:
  enabled: false
  image:
    registry: docker.io
    repository: redis
    tag: "8"
  architecture: standalone

  auth:
    enabled: false

  master:
    command: ["redis-server"]
    args: ["/config/redis.conf"]
    extraVolumeMounts:
      - name: redis-conf
        mountPath: /config
        readOnly: true
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      allowPrivilegeEscalation: false
    podSecurityContext:
      fsGroup: 999

prometheus-redis-exporter:
  enabled: true

  redisAddress: ""

elasticsearch:
  enabled: true
  # hostOverride: set to switch ELASTICSEARCH_HOST to es-hope-search during migration.
  # Example: "http://<release>-es-hope-search-master:9200"
  # Leave empty to auto-construct from release name (cluster A).
  hostOverride: ""
  # indexHost: when set, adds ELASTICSEARCH_INDEX_HOST to the backend secret.
  # Example: "http://<release>-es-hope-index-master:9200"
  indexHost: ""
  image:
    registry: docker.io
    repository: bitnamilegacy/elasticsearch
    tag: "8.18.0"
  sysctlImage:
    registry: docker.io
    repository: bitnamilegacy/os-shell
    tag: 12-debian-12-r51
  plugins: "analysis-phonetic,analysis-icu"
  enableDefaultInitContainers: true
  master:
    replicaCount: 1
  data:
    replicaCount: 0
  coordinating:
    replicaCount: 1
  ingest:
    enabled: false

# =============================================================================
# ES 9 ENABLING PLAN
#
# Two clusters: es-hope-search (search/dedup) and es-hope-index (reindex playbook).
# Both disabled by default. Roll out per env: dev → stg → trn → prd.
#
# DEV / STG / TRN  (1 master + 1 coordinating — mirrors cluster A topology)
# -----------------------------------------------------------------------------------------
#   Step 1 — spin up es-hope-search:
#     es-hope-search:
#       enabled: true
#     Verify: kubectl port-forward svc/<release>-es-hope-search-master 9201:9200 -n <ns>
#             curl http://localhost:9201/_cluster/health?pretty
#             curl http://localhost:9201/_cat/plugins?v
#
#   Step 2 — populate from Postgres:
#     python manage.py rebuild_program_indexes
#     curl http://localhost:9201/_cat/indices?v
#
#   Step 3 — cut over search traffic:
#     elasticsearch:
#       hostOverride: "http://<release>-es-hope-search-master:9200"
#
#   Step 4 — spin up es-hope-index (when dev team implements reindex playbook):
#     es-hope-index:
#       enabled: true
#     elasticsearch:
#       indexHost: "http://<release>-es-hope-index-master:9200"
#
# PRD  (full HA: 3 master + 2 data + 2 coordinating per cluster)
# -----------------------------------------------------------------------------------------
#   es-hope-search:
#     enabled: true
#     master:
#       replicaCount: 3
#       extraConfig: |   # override initial_master_nodes to list all 3
#         ...
#     data:
#       replicaCount: 2
#     coordinating:
#       replicaCount: 2
#   elasticsearch:
#     hostOverride: "http://<release>-es-hope-search-coordinating:9200"
#
#   (same pattern for es-hope-index)
#
# CLEANUP  (chart v0.15.0, after all 4 envs migrated)
# -----------------------------------------------------------------------------------------
#   Remove the original `elasticsearch` (Bitnami) sub-chart dependency.
#   Remove elasticsearch.hostOverride and this comment block.
# =============================================================================

# Shared base — official ES 9 image with Bitnami 22.1.6 chart.
# enableDefaultInitContainers: false skips copy-default-plugins (which requires Bitnami scripts).
# Plugins and sysctl handled by custom master/coordinating initContainers instead.
x-es9-base: &es9-base
  image:
    registry: docker.elastic.co
    repository: elasticsearch/elasticsearch
    tag: "9.0.1"
  sysctlImage:
    enabled: false
  enableDefaultInitContainers: false
  plugins: ""
  resources:
    requests:
      cpu: "25m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  # extraConfig is a template string — {{ include ... }} is resolved at helm template time.
  # Provides ES config at /usr/share/elasticsearch/config/elasticsearch.yml via extraVolumeMounts below.
  extraConfig: |
    path.data: /bitnami/elasticsearch/data
    cluster.name: {{ include "common.names.fullname" . }}
    xpack.security.enabled: false
    xpack.security.http.ssl.enabled: false
    discovery.seed_hosts:
      - {{ include "common.names.fullname" . }}-master-hl
    cluster.initial_master_nodes:
      - {{ include "common.names.fullname" . }}-master-0
  data:
    replicaCount: 0
  ingest:
    enabled: false

# Shared node-group config — applied to both master and coordinating via YAML merge.
x-es9-nodegroup: &es9-nodegroup
  containerSecurityContext:
    enabled: true
    runAsUser: 1000
    runAsGroup: 1000
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
  # sysctl: set vm.max_map_count per pod (needed since enableDefaultInitContainers: false skips sysctl).
  # install-plugins: writes analysis-phonetic + analysis-icu into empty-dir/app-plugins-dir,
  #   which the main container mounts at /usr/share/elasticsearch/plugins (see extraVolumeMounts).
  initContainers:
    - name: configure-sysctl
      image: "docker.elastic.co/elasticsearch/elasticsearch:9.0.1"
      command: ['sysctl', '-w', 'vm.max_map_count=262144']
      securityContext:
        privileged: true
        runAsUser: 0
    - name: install-plugins
      image: "docker.elastic.co/elasticsearch/elasticsearch:9.0.1"
      command:
        - bash
        - -c
        - |
          elasticsearch-plugin install --batch analysis-phonetic analysis-icu
      volumeMounts:
        - name: empty-dir
          mountPath: /usr/share/elasticsearch/plugins
          subPath: app-plugins-dir
  extraVolumeMounts:
    - name: empty-dir
      mountPath: /usr/share/elasticsearch/plugins
      subPath: app-plugins-dir
    - name: config
      mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
      subPath: my_elasticsearch.yml
  customStartupProbe:
    tcpSocket:
      port: 9200
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 30
  customReadinessProbe:
    httpGet:
      path: /_cluster/health?local=true
      port: 9200
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
  customLivenessProbe:
    tcpSocket:
      port: 9200
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 5

es-hope-search:
  <<: *es9-base
  enabled: false
  master:
    <<: *es9-nodegroup
    replicaCount: 1
  # coordinating: Bitnami 22.1.6 coordinating template always runs copy-default-plugins (no enableDefaultInitContainers gate).
  # That init container fails with the official image. Keep at 0 for dev/stg/trn.
  # For prod, override in hope-deployment values with explicit workaround.
  coordinating:
    replicaCount: 0

es-hope-index:
  <<: *es9-base
  enabled: false
  master:
    <<: *es9-nodegroup
    replicaCount: 1
  coordinating:
    replicaCount: 0

keyvault:
  enabled: true
  envMappings: []
  mountPath: /mnt/secrets
  secretName: "keyvault-secret"

  # tenantId:
  # userAssignedIdentityID:

monitoring:
  enabled: true