# Default values for status.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: os4d/birder
  tag: ""

global:
  imagePullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

deployment:
  port: 8000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

redis:
  enabled: true
  image:
    registry: docker.io
    repository: redis
    tag: "8"
  auth:
    enabled: false

  # Use custom config (no loadmodule) for official redis:8 — same as pipelines/redis/cd/stg.
  # Set master/replica.extraVolumes in deploy values with configMap name "<release-name>-redis-config".
  master:
    command: ["redis-server"]
    args: ["/config/redis.conf"]
    extraVolumeMounts:
      - name: redis-conf
        mountPath: /config
        readOnly: true
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      allowPrivilegeEscalation: false
    podSecurityContext:
      fsGroup: 999

  replica:
    command: ["redis-server"]
    args: ["/config/redis.conf"]
    extraVolumeMounts:
      - name: redis-conf
        mountPath: /config
        readOnly: true
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      allowPrivilegeEscalation: false
    podSecurityContext:
      fsGroup: 999
