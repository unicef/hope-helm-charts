global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

backend:
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8000

  config: {}

image:
  repository: unicef/hope-country-workspace

ingress:
  enabled: true
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  host: chart-example.local
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

flower:
  enabled: false

  service:
    type: ClusterIP
    port: 5555

celery:
  replicaCount: 1

keyvault:
  enabled: true
  mountPath: /mnt/secrets
  secretName: "keyvault-secret"

rollme:
  enabled: false

serviceAccount:
  create: false

redis:
  enabled: true
  image:
    registry: docker.io
    repository: redis
    tag: "8"
  auth:
    enabled: false

  # Use custom config (no loadmodule) for official redis:8 — same as pipelines/redis/cd/stg.
  # Set master/replica.extraVolumes in deploy values with configMap name "<release-name>-redis-config".
  master:
    command: ["redis-server"]
    args: ["/config/redis.conf"]
    extraVolumeMounts:
      - name: redis-conf
        mountPath: /config
        readOnly: true
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      allowPrivilegeEscalation: false
    podSecurityContext:
      fsGroup: 999

  replica:
    command: ["redis-server"]
    args: ["/config/redis.conf"]
    extraVolumeMounts:
      - name: redis-conf
        mountPath: /config
        readOnly: true
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      allowPrivilegeEscalation: false
    podSecurityContext:
      fsGroup: 999