global:
  imagePullSecrets: []

backend:
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8000

  autoscaling:
    enabled: false

celery:
  autoscaling:
    enabled: false

image:
  repository: unicef/hope-payment-gateway
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

keyvault:
  enabled: true
  envMappings: []
  mountPath: /mnt/secrets
  secretName: "keyvault-secret"

rollme:
  enabled: false

serviceAccount:
  create: false

flower:
  enabled: false
  service:
    port: 5555

ingress:
  enabled: true

redis:
  enabled: true
  image:
    registry: docker.io
    repository: redis
    tag: "8"
  auth:
    enabled: false

  # Use custom config (no loadmodule) for official redis:8 — same as pipelines/redis/cd/stg.
  # Set master/replica.extraVolumes in deploy values with configMap name "<release-name>-redis-config".
  master:
    command: ["redis-server"]
    args: ["/config/redis.conf"]
    extraVolumeMounts:
      - name: redis-conf
        mountPath: /config
        readOnly: true
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      allowPrivilegeEscalation: false
    podSecurityContext:
      fsGroup: 999

  replica:
    command: ["redis-server"]
    args: ["/config/redis.conf"]
    extraVolumeMounts:
      - name: redis-conf
        mountPath: /config
        readOnly: true
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      allowPrivilegeEscalation: false
    podSecurityContext:
      fsGroup: 999